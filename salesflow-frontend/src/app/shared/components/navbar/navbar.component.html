<nav class="w-full h-16 flex items-center px-4 md:px-8 gap-4 bg-sf-surface/95 backdrop-blur-md border-b border-sf-border/50 transition-all duration-300 shadow-lg">
  <!-- Mobile Menu Toggle -->
  <button (click)="toggleMobileMenu()" 
          class="lg:hidden p-2 rounded-xl bg-sf-bg border border-sf-border/50 text-sf-muted hover:text-sf-primary transition-all">
    <ng-icon [name]="mobileMenuOpen() ? 'heroXMark' : 'heroBars3'" class="text-2xl"></ng-icon>
  </button>

  <!-- Logo -->
  <div class="hidden lg:flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-white p-1 flex items-center justify-center border border-sf-border/40 shadow-sm">
      <img src="/logo.png" alt="Fair Direction Logo" class="w-full h-full object-contain rounded-lg" />
    </div>
    <span class="font-display font-black text-sf-text text-xl tracking-tighter">فير دايركشن</span>
  </div>
  <!-- Global Quarter Selector -->
  <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-sf-bg/60 border border-sf-border/40 shadow-sm hover:border-sf-primary/40 transition-all">
    <ng-icon name="heroCalendar" class="text-sf-primary text-base sm:text-lg"></ng-icon>
    <div class="hidden sm:block">
      <p class="text-[8px] font-black text-sf-muted leading-tight">{{ 'nav.quarter' | translate }}</p>
    </div>
    <select [value]="theme.currentQuarter()" 
            (change)="onQuarterChange($event)" 
            class="bg-transparent text-sf-text text-xs font-black outline-none border-none cursor-pointer focus:ring-0 pr-1 py-0 select-custom font-sans dir-rtl text-right">
      @for (q of theme.availableQuarters(); track q) {
        <option [value]="q" class="bg-sf-surface text-sf-text font-semibold text-xs">{{ formatQ(q) }}</option>
      }
    </select>
  </div>

  <div class="flex-1"></div>

  <!-- Actions -->
  <div class="flex items-center gap-2 md:gap-4">
    <button class="p-2.5 rounded-xl text-sf-muted hover:text-sf-primary hover:bg-sf-primary/10 transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </button>

    <button (click)="toggleTheme()" class="p-2.5 rounded-xl text-sf-muted hover:text-sf-primary hover:bg-sf-primary/10 transition-all duration-300">
      <ng-icon [name]="isDark() ? 'heroSun' : 'heroMoon'" class="text-xl"></ng-icon>
    </button>

    <!-- Language Toggle -->
    <button (click)="langService.toggle()"
            title="Switch language / تغيير اللغة"
            class="h-8 px-3 rounded-xl border transition-all duration-200 text-xs font-black tracking-wide
                   bg-sf-bg border-sf-border text-sf-muted hover:text-sf-primary hover:border-sf-primary/40
                   hover:bg-sf-primary/5 select-none">
      {{ langService.currentLang() === 'ar' ? 'EN' : 'ع' }}
    </button>

    <div class="w-px h-6 bg-sf-border/50 mx-1"></div>

    <div class="flex items-center gap-3 pl-1 pr-3 py-1 rounded-2xl bg-sf-elevated/30 border border-sf-border/30">
      <!-- Avatar -->
      <div class="w-8 h-8 rounded-lg flex-shrink-0 overflow-hidden shadow-sm">
        @if (currentUser()?.avatarUrl) {
          <img [src]="currentUser()!.avatarUrl!" class="w-full h-full object-cover" />
        } @else {
          <div class="w-full h-full bg-sf-surface border border-sf-border flex items-center justify-center text-sf-primary text-xs font-black">
            {{ currentUser()?.name?.charAt(0) || 'U' }}
          </div>
        }
      </div>
      <div class="hidden sm:block text-right">
        <p class="text-[10px] font-black text-sf-text leading-tight truncate max-w-[100px]">{{ currentUser()?.name }}</p>
        <p class="text-[8px] font-bold text-sf-muted leading-tight">{{ roleLabel() }}</p>
      </div>
    </div>
  </div>
</nav>
